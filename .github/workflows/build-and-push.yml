# Build all and push to container repository
name: build-and-push
on: [push]

permissions:
  packages: write

env:
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/spotilisk-frontend
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/spotilisk-backend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Get version
        id: version
        uses: sfidanza/ci-config/actions/get-version@main

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🎉 Build and push frontend image
        uses: docker/build-push-action@v7
        with:
          context: ./client/
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.FRONTEND_IMAGE }}:${{ steps.version.outputs.version }}
